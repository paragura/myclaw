# myclaw - Personal AI Assistant Config
# Secrets (token, api_url, model, api_key) should be set via .env
# .env variables override these defaults automatically.

[bot]
prefix = "!"

[ai]
max_tokens = 2048
temperature = 0.7

[db]
path = "/Users/paragura/ghq/github.com/paragura/myclaw/myclaw.db"

[tasks]
heartbeat = "*/5 * * * *"
memory_cleanup = "0 0 * * *"

[channels]
always_respond_channels = []

[web]
listen = "127.0.0.1:3000"
